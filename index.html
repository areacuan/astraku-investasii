<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraKu Investasi - Platform Investasi Terpercaya</title>
    <meta name="description" content="AstraKu Investasi - Platform investasi online dengan return harian 2%-7%. Minimal deposit Rp25.000, withdraw instan.">
    <meta name="keywords" content="investasi online, return harian, investasi terpercaya, astraku, profit harian">
    <meta name="author" content="AstraKu Investasi">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="AstraKu Investasi - Investasi dengan Return Harian">
    <meta property="og:description" content="Nikmati return 2%-7% per hari. Deposit mulai Rp25.000, withdraw mudah.">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        .countdown { font-family: monospace; font-size: 1rem; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50">

<!-- Navbar -->
<nav class="bg-white shadow-md fixed w-full top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 gradient-bg rounded-lg flex items-center justify-center">
                <span class="text-white font-bold text-lg">A</span>
            </div>
            <span class="font-bold text-xl text-blue-900">AstraKu</span>
            <span class="text-blue-600 font-semibold">Investasi</span>
        </div>
        <div id="nav-buttons" class="flex space-x-3">
            <!-- Akan diisi JS -->
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="pt-24 pb-12 gradient-bg">
    <div class="container mx-auto px-4 text-center text-white">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">Investasi Menguntungkan & Terpercaya</h1>
        <p class="text-lg md:text-xl mb-8 opacity-90">Return harian 2% - 7% • Deposit mulai Rp25.000 • Withdraw mudah</p>
        
        <!-- Statistik -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto mt-8">
            <div class="bg-white/10 backdrop-blur rounded-xl p-4">
                <p class="text-sm opacity-80">Total Dana Kelola</p>
                <p id="total-dana" class="text-2xl font-bold">Rp 0</p>
            </div>
            <div class="bg-white/10 backdrop-blur rounded-xl p-4">
                <p class="text-sm opacity-80">Total User Aktif</p>
                <p id="total-user" class="text-2xl font-bold">0</p>
            </div>
        </div>
    </div>
</section>

<!-- Paket Investasi -->
<section class="py-16 container mx-auto px-4">
    <h2 class="text-3xl font-bold text-center text-blue-900 mb-12">Paket Investasi</h2>
    <div id="paket-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Akan diisi JS -->
    </div>
</section>

<!-- Form Investasi & Riwayat -->
<section class="py-16 bg-white">
    <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Form Investasi -->
            <div class="bg-gray-50 rounded-xl p-6 shadow-sm">
                <h3 class="text-xl font-bold text-blue-900 mb-4">Form Investasi</h3>
                <div id="login-warning" class="hidden bg-yellow-100 border-l-4 border-yellow-500 p-4 mb-4">
                    <p class="text-yellow-700">Silakan <a href="login.html" class="font-bold underline">login</a> terlebih dahulu untuk berinvestasi</p>
                </div>
                <form id="investasi-form" class="hidden">
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Pilih Paket</label>
                        <select id="paket-select" class="w-full border rounded-lg px-4 py-2">
                            <option value="">-- Pilih Paket --</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Nominal Investasi (Rp)</label>
                        <input type="number" id="nominal-investasi" class="w-full border rounded-lg px-4 py-2" placeholder="Minimal sesuai paket">
                        <p id="range-info" class="text-sm text-gray-500 mt-1"></p>
                    </div>
                    <button type="submit" class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">Investasi Sekarang</button>
                </form>
            </div>
            
            <!-- Riwayat Investasi -->
            <div class="bg-gray-50 rounded-xl p-6 shadow-sm">
                <h3 class="text-xl font-bold text-blue-900 mb-4">Riwayat Investasi</h3>
                <div id="riwayat-container" class="space-y-3 max-h-96 overflow-y-auto">
                    <p class="text-gray-500 text-center">Belum ada investasi</p>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
