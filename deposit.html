<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - AstraKu Investasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>*{font-family:'Inter',sans-serif;}.gradient-bg{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 100%);}</style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-md fixed w-full top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 gradient-bg rounded-lg flex items-center justify-center">
                <span class="text-white font-bold text-lg">A</span>
            </div>
            <span class="font-bold text-xl text-blue-900">AstraKu</span>
            <span class="text-blue-600 font-semibold">Investasi</span>
        </div>
        <div id="nav-buttons" class="flex space-x-3"></div>
    </div>
</nav>

<div class="container mx-auto px-4 pt-24 pb-12 max-w-2xl">
    <div class="bg-white rounded-2xl shadow-xl p-6">
        <h2 class="text-2xl font-bold text-blue-900 mb-2">💰 Deposit Saldo</h2>
        <p class="text-gray-500 mb-6">Minimal: Rp25.000 • Maksimal: Rp25.000.000</p>
        
        <div class="bg-blue-50 rounded-lg p-4 mb-6">
            <p class="text-blue-900">Saldo saat ini: <span id="saldo-user" class="font-bold text-xl">Rp 0</span></p>
        </div>
        
        <form id="deposit-form">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nominal Deposit (Rp)</label>
                <input type="number" id="nominal" min="25000" max="25000000" class="w-full border rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Masukkan nominal" required>
            </div>
            <div class="mb-6">
                <p class="text-sm text-gray-500">⚠️ Biaya admin (0.7%) akan ditambahkan ke total pembayaran</p>
            </div>
            <button type="submit" class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">Buat Pesanan</button>
        </form>
    </div>
    
    <!-- Modal QRIS -->
    <div id="qris-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4">
            <div class="text-center">
                <h3 class="text-xl font-bold text-blue-900 mb-2">Scan QRIS untuk Membayar</h3>
                <p id="modal-nominal" class="text-gray-600 mb-4"></p>
                <div id="qrcode-container" class="flex justify-center mb-4"></div>
                <p class="text-sm text-gray-500 mb-2">Gunakan aplikasi bank atau e-wallet untuk scan QRIS</p>
                <p id="order-id-display" class="text-xs text-gray-400 mb-4"></p>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg">Tutup</button>
                    <button onclick="checkPaymentStatus()" class="flex-1 gradient-bg text-white py-2 rounded-lg">Cek Status</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
let currentOrderId = null;
let currentNominal = null;
let checkInterval = null;

// Ambil saldo user
async function loadSaldo() {
    const user = checkSession();
    if (user) {
        const snapshot = await db.ref('users/' + user.uid).once('value');
        const userData = snapshot.val();
        document.getElementById('saldo-user').innerHTML = formatRupiah(userData?.saldo || 0);
    }
}

// Create order via API Vercel
async function createOrder(nominal) {
    const user = checkSession();
    if (!user) {
        alert('Silakan login terlebih dahulu');
        window.location.href = 'login.html';
        return null;
    }
    
    try {
        const response = await fetch('/api/create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nominal: nominal,
                user_id: user.uid,
                email: user.email
            })
        });
        
        const data = await response.json();
        
        if (!data.ok) {
            throw new Error(data.error);
        }
        
        // Simpan order ke Firebase
        const orderData = {
            order_id: data.order_id,
            type: 'deposit',
            nominal: nominal,
            total_payment: data.total_payment,
            user_id: user.uid,
            username: user.username,
            status: 'pending',
            created_at: new Date().toISOString(),
            expired_at: data.expired_at
        };
        
        await db.ref('orders/' + data.order_id).set(orderData);
        
        return data;
        
    } catch (error) {
        console.error('Create order error:', error);
        alert('Gagal membuat pesanan: ' + error.message);
        return null;
    }
}

// Show QRIS modal
function showQRIS(orderData) {
    currentOrderId = orderData.order_id;
    currentNominal = orderData.nominal;
    document.getElementById('modal-nominal').innerHTML = `Total: ${formatRupiah(orderData.total_payment)}`;
    document.getElementById('order-id-display').innerHTML = `Order ID: ${orderData.order_id}`;
    
    // Generate QR Code
    const qrContainer = document.getElementById('qrcode-container');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
        text: orderData.qris,
        width: 200,
        height: 200
    });
    
    document.getElementById('qris-modal').classList.remove('hidden');
    
    // Mulai cek status tiap 5 detik
    if (checkInterval) clearInterval(checkInterval);
    checkInterval = setInterval(checkPaymentStatus, 5000);
}

// Check payment status via API
async function checkPaymentStatus() {
    if (!currentOrderId) return;
    
    try {
        const response = await fetch('/api/check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                order_id: currentOrderId,
                amount: currentNominal
            })
        });
        
        const data = await response.json();
        
        if (data.ok && data.status === 'paid') {
            clearInterval(checkInterval);
            alert('✅ Pembayaran berhasil! Saldo Anda telah bertambah.');
            
            // Update user data
            const user = checkSession();
            if (user) {
                const userSnapshot = await db.ref('users/' + user.uid).once('value');
                const userData = userSnapshot.val();
                user.saldo = userData.saldo;
                localStorage.setItem('astraku_user', JSON.stringify(user));
            }
            
            closeModal();
            window.location.href = 'dashboard.html';
        } else if (data.status === 'expired') {
            clearInterval(checkInterval);
            alert('⚠️ Pesanan telah kadaluarsa. Silakan buat pesanan baru.');
            closeModal();
        }
    } catch (error) {
        console.error('Check status error:', error);
    }
}

function closeModal() {
    document.getElementById('qris-modal').classList.add('hidden');
    if (checkInterval) clearInterval(checkInterval);
    currentOrderId = null;
}

// Submit deposit form
document.getElementById('deposit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nominal = parseInt(document.getElementById('nominal').value);
    
    if (isNaN(nominal) || nominal < 25000) {
        alert('Minimal deposit Rp25.000');
        return;
    }
    if (nominal > 25000000) {
        alert('Maksimal deposit Rp25.000.000');
        return;
    }
    
    // Disable button sambil loading
    const submitBtn = e.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.innerHTML = 'Memproses...';
    
    const orderData = await createOrder(nominal);
    
    submitBtn.disabled = false;
    submitBtn.innerHTML = 'Buat Pesanan';
    
    if (orderData) {
        showQRIS(orderData);
    }
});

// Inisialisasi
document.addEventListener('DOMContentLoaded', () => {
    updateNavbar();
    requireAuth();
    loadSaldo();
});
</script>
</body>
</html>
