<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - AstraKu Investasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>*{font-family:'Inter',sans-serif;}.gradient-bg{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 100%);}</style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-2xl">A</span>
                </div>
                <h2 class="text-2xl font-bold text-blue-900">Daftar Akun</h2>
                <p class="text-gray-500 mt-2">Mulai investasi bersama AstraKu</p>
            </div>
            
            <form id="register-form">
                <div class="mb-3">
                    <input type="text" id="username" placeholder="Username" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-3">
                    <input type="email" id="email" placeholder="Email" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-3">
                    <input type="tel" id="telepon" placeholder="Nomor Telepon" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="password" placeholder="Password" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="konfirmasi_password" placeholder="Konfirmasi Password" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-3">
                    <select id="bank" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Pilih Bank / E-Wallet</option>
                        <option value="BCA">BCA</option>
                        <option value="Mandiri">Mandiri</option>
                        <option value="BRI">BRI</option>
                        <option value="BNI">BNI</option>
                        <option value="DANA">DANA</option>
                        <option value="OVO">OVO</option>
                        <option value="GoPay">GoPay</option>
                        <option value="LinkAja">LinkAja</option>
                    </select>
                </div>
                <div class="mb-3">
                    <input type="text" id="nomor_rekening" placeholder="Nomor Rekening / E-Wallet" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-3">
                    <input type="text" id="nama_pemilik" placeholder="Nama Pemilik Rekening" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-4">
                    <input type="text" id="ref_code" placeholder="Kode Referral (opsional)" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">Daftar</button>
            </form>
            
            <p class="text-center text-gray-500 mt-6">Sudah punya akun? <a href="login.html" class="text-blue-600 font-semibold">Login</a></p>
        </div>
    </div>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Ambil kode referral dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) {
            document.getElementById('ref_code').value = refCode;
        }
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const konfirmasi = document.getElementById('konfirmasi_password').value;
            
            if (password !== konfirmasi) {
                alert('Password dan konfirmasi password tidak cocok');
                return;
            }
            
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                telepon: document.getElementById('telepon').value,
                password: password,
                bank: document.getElementById('bank').value,
                nomor_rekening: document.getElementById('nomor_rekening').value,
                nama_pemilik: document.getElementById('nama_pemilik').value,
                ref_code: document.getElementById('ref_code').value
            };
            
            const result = await register(userData);
            if (result.success) {
                alert('Pendaftaran berhasil! Silakan login.');
                window.location.href = 'login.html';
            } else {
                alert(result.error);
            }
        });
        
        if (checkSession()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
